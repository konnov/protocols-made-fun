name: Check links
on: [pull_request]
jobs:
  check-links:
    name: runner / lychee
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-loopback
            --exclude '^mailto:'
            --exclude 'localhost'
            './**/*.md'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
