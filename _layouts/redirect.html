<!doctype html>
<html lang="en">
  {% assign target_url = redirect_to %}
  {% if post and post.url %}
    {% assign target_url = post.url %}
  {% endif %}
  <head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0; url={{ target_url | relative_url }}">
    <link rel="canonical" href="{{ target_url | absolute_url }}">
    <title>Redirecting...</title>
  </head>
  <body>
    <p>Redirecting to <a href="{{ target_url | relative_url }}">{{ target_url | relative_url }}</a>.</p>
  </body>
</html>
